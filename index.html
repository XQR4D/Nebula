<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Video Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-container">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <section class="glass-container player-section">
            <h2 id="currentTitle">Выберите видео из списка</h2>
            <div class="player-wrapper">
                <video id="mainVideo" controls poster="thumb.jpg"></video>
            </div>
            
            <div class="controls-panel">
                <a id="downloadBtn" class="action-btn" download>⬇️ Скачать</a>
                <button class="action-btn" onclick="copyLink()">🔗 Ссылка</button>
                <button class="action-btn" onclick="copyEmbed()">&lt;/&gt; Код</button>
            </div>
        </section>

        <section class="glass-container library-section">
            <h3>Доступные ролики</h3>
            <div id="videoGrid" class="video-grid">
                <p id="loadingStatus">Загрузка библиотеки...</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
