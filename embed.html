<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Player Embed</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0b0f;
            --surface: #1b2118;
            --border-heavy: #ffffff;
            --accent-primary: #ff00aa;
            --accent-secondary: #00ffcc;
            --text: #f8f8f8;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Press Start 2P', system-ui, sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .embed-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 100%;
            max-height: 620px;
            background: var(--surface);
            box-shadow: 10px 10px 0 #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            image-rendering: pixelated;
        }

        .embed-header {
            background: var(--surface);
            border-bottom: 6px solid var(--border-heavy);
            padding: 12px 20px;
            text-align: center;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--accent-primary);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.85);
            border: 6px solid var(--accent-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            cursor: pointer;
            transition: all 0.15s linear;
            box-shadow: 6px 6px 0 #000;
        }

        .play-overlay::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 14px 0 14px 24px;
            border-color: transparent transparent transparent var(--accent-secondary);
            margin-left: 6px;
        }

        .play-overlay:hover {
            background: var(--accent-secondary);
            border-color: var(--accent-primary);
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 10px 10px 0 #000;
        }

        .play-overlay:hover::after {
            border-color: transparent transparent transparent #000;
        }

        .hidden {
            display: none !important;
        }

        .ended-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 6px solid var(--border-heavy);
            padding: 20px 40px;
            color: var(--accent-primary);
            font-size: 14px;
            text-align: center;
            z-index: 30;
            box-shadow: 8px 8px 0 #000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="embed-container" id="container">

        <div class="video-wrapper">
            <video id="v" preload="metadata" playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>

            <div class="play-overlay" id="playBtn"></div>

            <div class="ended-message" id="endedMessage">
                ВИДЕО ЗАВЕРШЕНО<br>
                <span style="font-size:10px; color:var(--accent-secondary);">НАЖМИТЕ ДЛЯ ПОВТОРА</span>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('v');
        const video = document.getElementById('v');
        const source = document.getElementById('videoSource');
        const container = document.getElementById('container');
        const playBtn = document.getElementById('playBtn');
        const endedMessage = document.getElementById('endedMessage');
        const embedTitle = document.getElementById('embedTitle');

        const videoName = params.get('n');
        if (videoName) {
            embedTitle.textContent = videoName.length > 38 
                ? videoName.substring(0, 35) + '...' 
                : videoName;
        }

        video.volume = 0.5;

        if (videoSrc) {
            const decodedUrl = decodeURIComponent(videoSrc);
            source.src = decodedUrl;
            video.load();
        }

        container.addEventListener('click', function(e) {
            if (video.paused || video.ended) {
                if (video.ended) {
                    video.currentTime = 0;
                    endedMessage.style.display = 'none';
                }
                
                playBtn.classList.add('hidden');
                endedMessage.style.display = 'none';
                video.controls = true;

                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Play error:", error);
                        playBtn.classList.remove('hidden');
                        video.controls = false;
                    });
                }
            }
        });

        video.addEventListener('ended', () => {
            playBtn.classList.remove('hidden');
            video.controls = false;
            endedMessage.style.display = 'block';
        });

        video.addEventListener('play', () => {
            playBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
