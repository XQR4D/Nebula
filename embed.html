<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        
        .embed-container { 
            position: relative; 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000;
        }
        
        .play-overlay {
            position: absolute;
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-overlay::after {
            content: '';
            width: 0; height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 6px;
        }

        .hidden { 
            opacity: 0; 
            visibility: hidden; 
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="embed-container" id="container">
        <video id="v" preload="metadata" playsinline></video>
        <div class="play-overlay" id="playBtn"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('v');
        const video = document.getElementById('v');
        const container = document.getElementById('container');
        const playBtn = document.getElementById('playBtn');

        // Устанавливаем источник видео
        if (videoSrc) {
            video.src = decodeURIComponent(videoSrc);
        }

        // Логика клика для запуска
        container.addEventListener('click', function() {
            if (video.paused) {
                playBtn.classList.add('hidden');
                video.controls = true; // Показываем стандартные кнопки управления после запуска
                
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error("Playback error:", error);
                        playBtn.classList.remove('hidden');
                        video.controls = false;
                    });
                }
            }
        });

        // Если видео закончилось, возвращаем кнопку "Play"
        video.addEventListener('ended', () => {
            playBtn.classList.remove('hidden');
            video.controls = false;
            video.load(); // Возвращаем к первому кадру
        });
    </script>
</body>
</html>
