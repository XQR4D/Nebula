<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Player Embed</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Press Start 2P', cursive;
        }
        
        .embed-container { 
            position: relative; 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
            border: 4px solid #fff; /* 8-bit рамка для вставки */
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000;
            image-rendering: pixelated; /* Поддержка ретро-стиля для превью */
        }
        
        .play-overlay {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #00ff00;
            display: flex;
            align-items: center; justify-content: center;
            z-index: 10;
            transition: all 0.2s steps(4); /* "Рваная" анимация для 8-бит стиля */
        }

        .play-overlay::after {
            content: '';
            width: 0; height: 0;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #00ff00;
            margin-left: 4px;
        }

        .hidden { 
            display: none;
        }

        /* Эффект при наведении на мобилках/десктопе */
        .embed-container:hover .play-overlay {
            background: #00ff00;
        }
        .embed-container:hover .play-overlay::after {
            border-color: transparent transparent transparent #000;
        }
    </style>
</head>
<body>
    <div class="embed-container" id="container">
        <video id="v" preload="metadata" playsinline>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <div class="play-overlay" id="playBtn"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('v');
        const video = document.getElementById('v');
        const source = document.getElementById('videoSource');
        const container = document.getElementById('container');
        const playBtn = document.getElementById('playBtn');

        // Установка громкости по умолчанию (0.4 = 40%)
        video.volume = 0.4;

        if (videoSrc) {
            const decodedUrl = decodeURIComponent(videoSrc);
            // Добавляем #t=0.1 для превью
            source.src = decodedUrl + "#t=0.1";
            video.load();
        }

        container.addEventListener('click', function() {
            if (video.paused) {
                // Если мы на превью-кадре, сбрасываем в ноль для чистого старта
                if (video.currentTime < 0.2) {
                    video.currentTime = 0;
                }
                
                playBtn.classList.add('hidden');
                video.controls = true;
                
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Error:", error);
                        playBtn.classList.remove('hidden');
                        video.controls = false;
                    });
                }
            }
        });

        video.addEventListener('ended', () => {
            playBtn.classList.remove('hidden');
            video.controls = false;
            video.currentTime = 0; // Возвращаем к началу (и превью) после конца
        });
    </script>
</body>
</html>
