<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        
        .embed-container { 
            position: relative; 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            /* contain — покажет видео целиком с черными полосами, 
               cover — растянет на весь размер 800х500 без полос (как в соцсетях) */
            object-fit: contain; 
            background: #000;
        }
        
        /* Кнопка Play */
        .play-overlay {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Треугольник внутри кнопки */
        .play-overlay::before {
            content: '';
            width: 0; height: 0;
            border-style: solid;
            border-width: 15px 0 15px 26px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 6px;
        }

        .embed-container:hover .play-overlay { 
            transform: scale(1.1); 
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    </style>
</head>
<body>
    <div class="embed-container" id="container">
        <video id="v" preload="metadata" playsinline>
            <source src="" type="video/mp4">
        </video>
        <div class="play-overlay" id="playBtn"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('v');
        const video = document.getElementById('v');
        const container = document.getElementById('container');
        const playBtn = document.getElementById('playBtn');

        if (videoSrc) {
            video.src = videoSrc + "#t=0.5"; // Кадр на 0.5 сек для превью
        }

        container.onclick = () => {
            if (video.paused) {
                video.play();
                video.controls = true;
                playBtn.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
