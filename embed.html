<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .embed-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Кнопка Play как на скриншоте */
        .play-overlay {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.3s ease;
            z-index: 10;
        }
        .play-overlay:after {
            content: '';
            display: block;
            box-sizing: border-box;
            width: 0; height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #fff;
            margin-left: 5px;
        }
        .embed-container:hover .play-overlay { transform: scale(1.1); background: rgba(255, 255, 255, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="embed-container" id="container">
        <video id="v" preload="metadata" playsinline>
            <source src="" type="video/mp4">
        </video>
        <div class="play-overlay" id="playBtn"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('v');
        const video = document.getElementById('v');
        const container = document.getElementById('container');
        const playBtn = document.getElementById('playBtn');

        if (videoSrc) {
            video.src = videoSrc + "#t=0.1"; // Подгружаем первый кадр
        }

        container.onclick = () => {
            if (video.paused) {
                video.play();
                video.controls = true;
                playBtn.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
